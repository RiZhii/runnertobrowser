version: "3.9"

services:

  browser-box:
    build:
      context: .
      dockerfile: dockerfile
    container_name: browser-box
    ports:
      - "6080:6080"
      - "8554:8554"
      - "8889:8889"
      - "9222:9222"
      - "9223:9223"

  runner:
    build:
      context: ./runner
      dockerfile: dockerfile
    container_name: runner
    depends_on:
      - browser-box